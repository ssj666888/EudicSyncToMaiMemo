name: Sync Words

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # ❗【重要修改 1】赋予机器人向你仓库提交代码的权限
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Run Sync
        run: dotnet run --project src/EudicSyncToMaiMemo/EudicSyncToMaiMemo.csproj --configuration Release -- --sync-once
        env:
          Eudic__Authorization: ${{ secrets.EUDIC_AUTHORIZATION }}
          Eudic__DefaultBookId: ${{ secrets.EUDIC_BOOK_ID }}
          MaiMemo__Provider: OpenApi
          MaiMemo__Token: ${{ secrets.MAIMEMO_TOKEN }}
          MaiMemo__DefaultNotepadId: ${{ secrets.MAIMEMO_NOTEPAD_ID }}
          Notification__Enabled: ${{ secrets.NOTIFICATION_ENABLED }}
          Notification__Url: ${{ secrets.NOTIFICATION_URL }}
          Notification__RequestBody: ${{ secrets.NOTIFICATION_REQUEST_BODY }}
          Notification__Headers: ${{ secrets.NOTIFICATION_HEADERS }}
      # ❗【重要修改 2】原生防休眠大招：每次跑完自动推一个空提交，永远不触发 60 天休眠机制
      - name: Keep Workflow Alive
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit --allow-empty -m "Keepalive: Auto-commit to prevent workflow suspension"
          git push          
