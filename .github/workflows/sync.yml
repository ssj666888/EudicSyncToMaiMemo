name: Sync Words

on:
  schedule:
    - cron: '0 16 * * *' # 每周日下午 4 点自动运行
  workflow_dispatch:   # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # ✨ 保险 1：拉取完整的 Git 历史，不让版本工具因找不到历史而抓狂

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run Sync Script
        env:
          EUDIC_AUTHORIZATION: ${{ secrets.EUDIC_AUTHORIZATION }}
          EUDIC_BOOK_ID: ${{ secrets.EUDIC_BOOK_ID }}
          MAIMEMO_TOKEN: ${{ secrets.MAIMEMO_TOKEN }}
          MAIMEMO_NOTEPAD_ID: ${{ secrets.MAIMEMO_NOTEPAD_ID }}
          NOTIFICATION_ENABLED: ${{ secrets.NOTIFICATION_ENABLED }}
          NOTIFICATION_URL: ${{ secrets.NOTIFICATION_URL }}
          NBGV_Disable: true # ✨ 保险 2：直接强制禁用版本计算。老子只是来同步单词的，不需要版本号！
        run: |
          dotnet run --project src/EudicSyncToMaiMemo/EudicSyncToMaiMemo.csproj

      - name: Keep Workflow Alive
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull origin main --rebase
          git commit --allow-empty -m "Keepalive: Auto-commit to prevent workflow suspension"
          git push origin main
